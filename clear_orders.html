<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسح الطلبات</title>
    <style>
        * {
            font-family: 'Cairo', Arial, sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #e74c3c;
            margin-bottom: 20px;
        }
        .info {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #856404;
        }
        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }
        button:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 1px solid #28a745;
            color: #155724;
            display: block;
        }
        .result.error {
            background: #f8d7da;
            border: 1px solid #dc3545;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ مسح جميع الطلبات</h1>
        <div class="info">
            ⚠️ تحذير: سيتم مسح جميع الطلبات من localStorage بما في ذلك:
            <ul style="text-align: right; margin: 10px 0;">
                <li>الطلبات العادية (orders)</li>
                <li>الطلبات المعلقة (ordersOnHold)</li>
                <li>تاريخ المبيعات (salesHistory)</li>
                <li>الطلبات المستأنفة (resumeOrder)</li>
            </ul>
            هذا الإجراء لا يمكن التراجع عنه!
        </div>
        <button onclick="clearOrders()">مسح جميع الطلبات</button>
        <div id="result" class="result"></div>
    </div>

    <script>
        function clearOrders() {
            if (!confirm('هل أنت متأكد من مسح جميع الطلبات؟ هذا الإجراء لا يمكن التراجع عنه!')) {
                return;
            }

            try {
                // قائمة بجميع مفاتيح الطلبات
                const orderKeys = [
                    'orders',
                    'ordersOnHold',
                    'salesHistory',
                    'resumeOrder'
                ];

                // مسح المفاتيح
                orderKeys.forEach(key => {
                    localStorage.removeItem(key);
                    // إعادة تهيئة كمصفوفات فارغة
                    if (key === 'orders' || key === 'ordersOnHold' || key === 'salesHistory') {
                        localStorage.setItem(key, JSON.stringify([]));
                    }
                });

                // عرض رسالة النجاح
                const result = document.getElementById('result');
                result.className = 'result success';
                result.innerHTML = '✅ تم مسح جميع الطلبات بنجاح!<br>يمكنك الآن إغلاق هذه الصفحة.';
                
                console.log('✅ تم مسح جميع الطلبات من localStorage');
            } catch (error) {
                const result = document.getElementById('result');
                result.className = 'result error';
                result.innerHTML = '❌ حدث خطأ: ' + error.message;
                console.error('❌ خطأ في مسح الطلبات:', error);
            }
        }

        // عرض عدد الطلبات الحالية
        window.addEventListener('load', () => {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const ordersOnHold = JSON.parse(localStorage.getItem('ordersOnHold') || '[]');
            const salesHistory = JSON.parse(localStorage.getItem('salesHistory') || '[]');
            
            const total = orders.length + ordersOnHold.length + salesHistory.length;
            
            if (total > 0) {
                const info = document.querySelector('.info');
                info.innerHTML += `<br><strong>عدد الطلبات الحالية: ${total}</strong>`;
            }
        });
    </script>

        <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    <script src="saas/sidebar.js"></script>
    <script src="saas/plans-ui.js"></script>
    <script src="saas/auth-ui.js"></script>
    <script src="saas/subscription-manager.js"></script>
    <script>
    // ═══════════════════════════════════════════════════════
    // SaaS Feature Gates — إخفاء الصفحات حسب الباقة
    // ═══════════════════════════════════════════════════════
    window.addEventListener('saas-ready', function () {

        // ── الصفحات المقفولة على Basic فأكثر ──────────────
        if (!window.SaaS.canUse('reports')) {
            document.querySelector('a[href="reports.html"]')
                ?.style.setProperty('display', 'none', 'important');
        }
        if (!window.SaaS.canUse('customers')) {
            document.querySelector('a[href="customers.html"]')
                ?.style.setProperty('display', 'none', 'important');
        }

        // ── الصفحات المقفولة على Pro فقط ───────────────────
        if (!window.SaaS.canUse('whatsapp')) { // 'whatsapp' is a Pro feature
            document.querySelector('a[href="marketing.html"]')
                ?.style.setProperty('display', 'none', 'important');
        }
        
        // ── Badge ──────────────────────────────────────────
        const plan = window.SaaS.getPlan();
        const planLabel = window.SaaS.getPlanLabel();
        const endDate = window.SaaS.getEndDate();

        const sidebar = document.querySelector('.sidebar');
        if (sidebar && !document.getElementById('saas-plan-badge')) {
            const badge = document.createElement('div');
            badge.id = 'saas-plan-badge';

            const colors = { trial: '#4a9eff', basic: '#d4af37', pro: '#9b59b6', mega: '#e74c3c' };
            const color  = colors[plan] || '#d4af37';

            const daysLeft = endDate
                ? Math.max(0, Math.ceil((new Date(endDate) - new Date()) / 86400000))
                : null;

            badge.style.cssText = 'margin: 12px; padding: 12px 14px; background: ' + color + '15; border: 1px solid ' + color + '44; border-radius: 10px; font-size: 12px; text-align: center;';
            
            let badgeHTML = '<div style="color:' + color + '; font-weight:700; margin-bottom:4px;">' + (plan === 'mega' ? '🚀' : plan === 'pro' ? '👑' : plan === 'basic' ? '⭐' : '🕐') + ' ' + planLabel + '</div>';

            if (daysLeft !== null) {
                badgeHTML += '<div style="color:#888; font-size:11px;">' + daysLeft + ' يوم متبقي</div>';
            }

            if (plan !== 'mega') {
                badgeHTML += '<button onclick="window.SaaS.requireFeature(\'dashboard\')" style="margin-top:8px; width:100%; padding:6px; background:' + color + '; border:none; border-radius:6px; color:#000; font-size:11px; font-weight:700; cursor:pointer;">ترقية الباقة ↑</button>';
            }

            badge.innerHTML = badgeHTML;
            sidebar.appendChild(badge);
        }

    });
    </script>

</body>
</html>
