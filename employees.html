<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموظفون</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        * {
            font-family: 'Poppins', 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        body {
            background: #fafafa;
        }
        
        .sidebar {
            background: #ffffff;
            border-left: 1px solid #e8e8e8;
        }
        
        .sidebar-item {
            color: #000000;
        }
        
        .sidebar-item:hover {
            background: #f5f5f5;
        }
        
        .sidebar-item.active {
            background: #000000;
            color: #ffffff;
        }
        
        .header {
            background: #ffffff;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-lg);
            height: 80px;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: var(--spacing-lg);
        }
        
        .header-title {
            color: #000000;
            font-weight: 700;
            font-size: 24px;
            margin: 0;
            white-space: nowrap;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        
        .header-search {
            background: #fafafa;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 250px;
        }
        
        .header-search i {
            color: #999999;
            font-size: 14px;
        }
        
        .header-search input {
            border: none;
            background: transparent;
            outline: none;
            color: #000000;
            font-size: 14px;
            flex: 1;
        }
        
        .header-search input::placeholder {
            color: #999999;
        }
        
        .main-content {
            background: #fafafa;
            padding: var(--spacing-lg);
        }
        
        .employees-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-lg);
        }
        
        .employees-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }
        
        .employees-header h2 {
            color: #000000;
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }
        
        .employees-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--spacing-lg);
        }
        
        .employee-card {
            background: #ffffff;
            border-radius: 20px;
            padding: var(--spacing-lg);
            border: 1px solid #e8e8e8;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .employee-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }
        
        .employee-profile {
            display: flex;
            align-items: center;
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid #e8e8e8;
        }
        
        .employee-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            margin-left: var(--spacing-md);
            flex-shrink: 0;
        }
        
        .employee-info {
            flex: 1;
        }
        
        .employee-name {
            font-size: 18px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 4px;
        }
        
        .employee-role {
            font-size: 14px;
            color: #666666;
        }
        
        .employee-details {
            margin-bottom: var(--spacing-md);
        }
        
        .employee-detail-item {
            display: flex;
            align-items: center;
            margin-bottom: var(--spacing-sm);
            font-size: 14px;
            color: #000000;
        }
        
        .employee-detail-item i {
            width: 20px;
            margin-left: var(--spacing-sm);
            color: #666666;
        }
        
        .employee-actions {
            display: flex;
            gap: var(--spacing-sm);
        }
        
        .btn-call, .btn-whatsapp, .btn-edit, .btn-delete {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .btn-call {
            background: #27AE60;
            color: #ffffff;
        }

        .btn-call:hover {
            background: #229954;
        }

        .btn-whatsapp {
            background: #25D366;
            color: #ffffff;
        }

        .btn-whatsapp:hover {
            background: #1ebe5d;
        }
        
        .btn-edit {
            background: #3498DB;
            color: #ffffff;
        }
        
        .btn-edit:hover {
            background: #2980B9;
        }
        
        .btn-delete {
            background: #E74C3C;
            color: #ffffff;
        }
        
        .btn-delete:hover {
            background: #C0392B;
        }
        
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: var(--spacing-2xl);
            color: #999999;
            font-size: 16px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #ffffff;
            border-radius: 20px;
            padding: var(--spacing-xl);
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid #e8e8e8;
        }
        
        .modal-title {
            color: #000000;
            font-size: 20px;
            font-weight: 700;
            margin: 0;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            color: #999999;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .modal-close:hover {
            background: #f5f5f5;
            color: #000000;
        }
        
        .form-group {
            margin-bottom: var(--spacing-lg);
        }
        
        .label {
            display: block;
            margin-bottom: 8px;
            color: #000000;
            font-weight: 600;
            font-size: 14px;
        }
        
        .input, .select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            background: #ffffff;
            color: #000000;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .input:focus, .select:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }
        
        .btn-primary {
            background: #000000;
            color: #ffffff;
        }
        
        .btn-secondary {
            background: #fafafa;
            color: #000000;
            border: 1px solid #e8e8e8;
        }

        /* كود إجبار الخانات على الكتابة والضغط */
        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            pointer-events: auto !important;
            user-select: text !important;
            -webkit-user-select: text !important;
            -webkit-app-region: no-drag !important;
            position: relative !important;
            z-index: 9999 !important;
        }
        .form-group {
            position: relative;
            z-index: 9998;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar"></nav>

        <div class="main-wrapper">
            <header class="header">
                <div class="header-content">
                    <img src="images/logo.png" class="header-logo" alt="Solo POS">
             <h2 class="header-title">الموظفون</h2>
                    <div class="header-actions">
                        <div class="header-search">
                            <i class="fas fa-search"></i>
                            <input type="text" id="employeeSearch" placeholder="ابحث عن موظف...">
                        </div>
                        <button class="btn btn-primary" onclick="openAddEmployeeModal()">
                            <i class="fas fa-plus" style="margin-left: 8px;"></i>
                            إضافة موظف
                        </button>
                    </div>
                </div>
            </header>

            <main class="main-content">
                <div class="employees-container">
                    <div class="employees-grid" id="employeesGrid">
                        <div class="empty-state">لا يوجد موظفين</div>
                    </div>
                    
                    <!-- Team Performance Section — مخفية مؤقتاً -->

                    <!-- Attendance Summary (Business Month) -->
                    <div class="card" style="margin-top: var(--spacing-lg);">
                        <h3 style="color: #000000; font-weight: 700; margin-bottom: var(--spacing-lg); font-size: 20px;">🗓️ حضور الموظفين (هذا الشهر)</h3>
                        <div style="color:#666666; font-size: 13px; margin-bottom: var(--spacing-md);">
                            اليوم التجاري الحالي: <strong id="attendanceMonthBusinessDate" style="color:#000000;">-</strong>
                        </div>
                        <div id="attendanceSummary" style="display: grid; gap: var(--spacing-md);">
                            <div style="text-align: center; padding: var(--spacing-md); color: #999999;">جاري التحميل...</div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Attendance Details Modal -->
    <div class="modal" id="attendanceDetailsModal">
        <div class="modal-content" style="max-width: 720px;">
            <div class="modal-header">
                <h3 class="modal-title" id="attendanceDetailsTitle">تفاصيل الحضور</h3>
                <button class="modal-close" onclick="closeAttendanceDetails()">×</button>
            </div>
            <div style="padding: var(--spacing-lg);">
                <div id="attendanceDetailsBody" style="display:grid; gap: 10px;">
                    <div style="text-align:center; color:#999999; padding: var(--spacing-lg);">جاري التحميل...</div>
                </div>
                <div style="display:flex; gap: var(--spacing-md); margin-top: var(--spacing-xl);">
                    <button type="button" class="btn btn-secondary" style="flex:1;" onclick="closeAttendanceDetails()">إغلاق</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Employee Modal -->
    <div class="modal" id="employeeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="employeeModalTitle">إضافة موظف جديد</h3>
                <button class="modal-close" onclick="closeEmployeeModal()">×</button>
            </div>
            <form id="employeeForm" onsubmit="handleEmployeeSubmit(event)">
                <div class="form-group">
                    <label class="label">اسم الموظف *</label>
                    <input type="text" class="input" id="employeeName" placeholder="أدخل اسم الموظف" required>
                </div>
                
                <div class="form-group">
                    <label class="label">رقم الهاتف (اختياري)</label>
                    <input type="tel" class="input" id="employeePhone" placeholder="أدخل رقم الهاتف">
                </div>
                
                <div class="form-group">
                    <label class="label">المنصب *</label>
                    <select class="select" id="employeeRole" required>
                        <option value="">اختر المنصب</option>
                        <option value="كاشير">كاشير</option>
                        <option value="طباخ">طباخ</option>
                        <option value="نادل">نادل</option>
                        <option value="مدير">مدير</option>
                        <option value="أخرى">أخرى</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="label">الراتب الشهري (ج.م) *</label>
                    <input type="number" class="input" id="employeeSalary" min="0" step="0.01" placeholder="مثال: 3000" required>
                </div>


                <div style="display: flex; gap: var(--spacing-md); margin-top: var(--spacing-xl);">
                    <button type="button" class="btn btn-secondary" onclick="closeEmployeeModal()" style="flex: 1;">إلغاء</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">حفظ</button>
                </div>
            </form>
        </div>
    </div>


    <!-- Firebase and Core Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/firestore_service.js"></script>
    <script src="js/sync_manager.js"></script>
    <script src="js/db-service.js"></script>
    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof SyncManager !== 'undefined' && typeof SyncManager.init === 'function') {
                SyncManager.init();
            }
        });
        
        let employees = [];
        let systemUsersForDisplay = [];
        let editingEmployeeId    = null;
        let editingSystemUserId  = null; // ID للمستخدم من النظام عند التعديل

        function _onRoleChange() {
          // PIN and page permissions are managed in User Management (Settings → إدارة المستخدمين)
        }
        
        // Check login and apply permissions
        if (typeof Auth !== 'undefined') {
            Auth.checkLogin();
            Auth.checkPageAccess('employees.html');
            Auth.applyPermissions();
        } else {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
            }
        }
        
        function logout() {
            if (typeof Auth !== 'undefined') {
                Auth.logout();
            } else {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('username');
                localStorage.removeItem('userType');
                window.location.href = 'login.html';
            }
        }
        
        // Load employees + system users
        async function loadEmployees() {
            try {
                // جيب المستخدمين من النظام (كاشير/مالك/مدير)
                try {
                    systemUsersForDisplay = window.DBService
                        ? ((await window.DBService.getUsers()) || [])
                        : JSON.parse(localStorage.getItem('users') || '[]');
                } catch (_) {
                    try { systemUsersForDisplay = JSON.parse(localStorage.getItem('users') || '[]'); } catch (__) {}
                }

                // جيب الموظفين العاديين (طباخ/نادل/إلخ)
                if (typeof DataManager !== 'undefined' && DataManager.getEmployees) {
                    const data = await DataManager.getEmployees();
                    employees = data || [];
                } else {
                    try {
                        if (window.DBService && typeof window.DBService.getEmployees === 'function') {
                            employees = await window.DBService.getEmployees() || [];
                        } else {
                            employees = [];
                        }
                    } catch (e) {
                        employees = [];
                    }
                }

                renderEmployees();
                // loadTeamPerformance(); // مخفية مؤقتاً
            } catch (error) {
                console.error('Error loading employees:', error);
                employees = [];
                renderEmployees();
                // loadTeamPerformance(); // مخفية مؤقتاً
            }
        }
        
        // Render employees + system users
        function renderEmployees() {
            const grid = document.getElementById('employeesGrid');
            if (!grid) return;

            // لونات/أيقونات المستخدمين من النظام
            const sysRoleColors  = { owner: '#f59e0b', admin: '#8b5cf6', cashier: '#3b82f6' };
            const sysRoleLabels  = { owner: 'مالك', admin: 'مدير', cashier: 'كاشير' };
            const sysRoleIcons   = { owner: '👑', admin: '👔', cashier: '💰' };

            // كروت المستخدمين من النظام — نفس ديزاين كروت الموظفين بالظبط
            const sysNames = new Set();
            const sysCards = (systemUsersForDisplay || [])
                .filter(u => u.displayName || u.name || u.username)
                .map(u => {
                    const uid     = String(u.id || u.uid || u.username || '');
                    const name    = u.displayName || u.name || u.username || '';
                    const role    = u.role || 'cashier';
                    const color   = sysRoleColors[role]  || '#3b82f6';
                    const label   = sysRoleLabels[role]  || role;
                    const icon    = sysRoleIcons[role]   || '💰';
                    const phone   = u.phone || '';
                    const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                    const uidSafe = encodeURIComponent(uid);
                    sysNames.add(name.toLowerCase());
                    return `
                    <div class="employee-card" style="border-top:3px solid ${color};">
                        <div class="employee-profile">
                            <div class="employee-avatar" style="background:linear-gradient(135deg,${color}33,${color}55);color:${color};border:2px solid ${color}44;">
                                ${initials}
                            </div>
                            <div class="employee-info">
                                <div class="employee-name">${name}</div>
                                <div class="employee-role">
                                    <span style="color:${color};font-weight:700;">${icon} ${label}</span>
                                    <span style="font-size:10px;background:#f5f5f5;color:#aaa;border-radius:5px;padding:1px 5px;margin-right:5px;">نظام</span>
                                </div>
                            </div>
                        </div>
                        <div class="employee-details">
                            <div class="employee-detail-item">
                                <i class="fas fa-phone"></i>
                                <span>${phone || 'لم يُضف رقم بعد'}</span>
                            </div>
                            <div class="employee-detail-item">
                                <i class="fas fa-money-bill-wave"></i>
                                <span>الراتب الشهري: ${typeof Utils !== 'undefined' ? Utils.formatCurrency(parseFloat(u.salary) || 0) : ((parseFloat(u.salary) || 0) + ' ج.م')}</span>
                            </div>
                        </div>
                        <div class="employee-actions">
                            <button class="btn-call" onclick="callEmployee('${phone}')" ${!phone ? 'style="opacity:.45;cursor:not-allowed;"' : ''}>
                                <i class="fas fa-phone"></i>اتصال
                            </button>
                            <button class="btn-whatsapp" onclick="openWhatsApp('${phone}')" ${!phone ? 'style="opacity:.45;cursor:not-allowed;"' : ''}>
                                <i class="fab fa-whatsapp"></i>واتساب
                            </button>
                            <button class="btn-edit" onclick="editSystemUser('${uidSafe}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-delete" onclick="deleteSystemUser('${uidSafe}')" data-restricted="owner">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>`;
                }).join('');

            // لونات الموظفين العاديين حسب الدور
            const empRoleColors = { 'طباخ': '#ef4444', 'نادل': '#10b981', 'مدير': '#8b5cf6', 'كاشير': '#3b82f6', 'أخرى': '#64748b' };
            const empRoleIcons  = { 'طباخ': '🍳', 'نادل': '🧑‍🍽️', 'مدير': '👔', 'كاشير': '💰', 'أخرى': '👤' };

            // كروت الموظفين العاديين (بدون تكرار من النظام)
            const empCards = employees
                .filter(e => !sysNames.has((e.name || '').toLowerCase()))
                .map(employee => {
                    const initials  = employee.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                    const eColor    = empRoleColors[employee.role] || '#64748b';
                    const eIcon     = empRoleIcons[employee.role]  || '👤';
                    const _fmtSal   = v => typeof Utils !== 'undefined' ? Utils.formatCurrency(v) : (v + ' ج.م');
                    return `
                    <div class="employee-card" data-employee-id="${employee.id}" style="border-top:3px solid ${eColor};">
                        <div class="employee-profile">
                            <div class="employee-avatar" style="background:linear-gradient(135deg,${eColor}33,${eColor}55);color:${eColor};border:2px solid ${eColor}44;">${initials}</div>
                            <div class="employee-info">
                                <div class="employee-name">${employee.name}</div>
                                <div class="employee-role" style="color:${eColor};font-weight:700;">${eIcon} ${employee.role || 'غير محدد'}</div>
                            </div>
                        </div>
                        <div class="employee-details">
                            <div class="employee-detail-item">
                                <i class="fas fa-phone"></i>
                                <span>${employee.phone || '—'}</span>
                            </div>
                            <div class="employee-detail-item">
                                <i class="fas fa-money-bill-wave"></i>
                                <span>الراتب الشهري: ${_fmtSal(parseFloat(employee.salary) || 0)}</span>
                            </div>
                        </div>
                        <div class="employee-actions">
                            <button class="btn-call" onclick="callEmployee('${employee.phone}')">
                                <i class="fas fa-phone"></i>اتصال
                            </button>
                            <button class="btn-whatsapp" onclick="openWhatsApp('${employee.phone}')">
                                <i class="fab fa-whatsapp"></i>واتساب
                            </button>
                            <button class="btn-edit" onclick="editEmployee('${employee.id}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-delete" onclick="deleteEmployee('${employee.id}')" data-restricted="owner">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>`;
                }).join('');

            const allCards = sysCards + empCards;
            grid.innerHTML = allCards || '<div class="empty-state">لا يوجد موظفون أو مستخدمون<br><small style="color:#999;font-size:14px;">اضغط على "إضافة موظف" لإضافة موظف جديد</small></div>';
        }
        
        // ربط تغيير الدور بإظهار/إخفاء الحقول
        document.getElementById('employeeRole').addEventListener('change', _onRoleChange);

        // Edit Employee
        function editEmployee(id) {
            const employee = employees.find(e => e.id === id);
            if (!employee) return;

            editingEmployeeId   = id;
            editingSystemUserId = null;
            document.getElementById('employeeModalTitle').textContent = 'تعديل موظف';
            document.getElementById('employeeName').value = employee.name || '';
            document.getElementById('employeePhone').value = employee.phone || '';
            document.getElementById('employeeRole').value = employee.role || '';
            const salaryInput = document.getElementById('employeeSalary');
            if (salaryInput) salaryInput.value = employee.salary !== undefined ? employee.salary : '';


            document.getElementById('employeeModal').classList.add('active');
        }
        
        // Delete Employee
        async function deleteEmployee(id) {
            try {
                if (typeof Auth !== 'undefined' && typeof Auth.canDelete === 'function' && !Auth.canDelete()) {
                    if (typeof Notification !== 'undefined') Notification.error('الحذف مسموح لصاحب المحل فقط');
                    else alert('الحذف مسموح لصاحب المحل فقط');
                    return;
                }
            } catch (_) {}

            if (!confirm('هل أنت متأكد من حذف هذا الموظف؟')) return;

            try {
                // Step 1: Tell DataManager to handle the deletion (local and remote via sync)
                await DataManager.removeEmployee(id);

                // Step 2: Immediately remove the employee card from the UI
                const employeeCard = document.querySelector(`.employee-card[data-employee-id="${id}"]`);
                if (employeeCard) {
                    employeeCard.classList.add('fade-out-and-remove');
                    setTimeout(() => employeeCard.remove(), 500); // Wait for animation
                }

                if (typeof Notification !== 'undefined') {
                    Notification.success('تم حذف الموظف بنجاح');
                }

                // Reload performance stats as it depends on employees list
                // loadTeamPerformance(); // مخفية مؤقتاً

            } catch (error) {
                console.error('Error during employee deletion process:', error);
                if (typeof Notification !== 'undefined') {
                    Notification.error('حدث خطأ أثناء حذف الموظف');
                }
            }
        }

        // ========================
        // System User Edit / Delete
        // ========================
        function _getSysModalFields() {

                salaryGroup: document.getElementById('employeeSalary')?.closest?.('.form-group'),
            };

        function editSystemUser(uidEnc) {
            const uid = decodeURIComponent(uidEnc);
            const user = (systemUsersForDisplay || []).find(u =>
                String(u.id || u.uid || u.username || '') === uid
            );
            if (!user) return;

            editingEmployeeId   = null;
            editingSystemUserId = uid;

            const name  = user.displayName || user.name || user.username || '';
            const phone = user.phone || '';

            const roleLabel  = { owner: 'مالك', admin: 'مدير', cashier: 'كاشير' }[user.role] || user.role || '';
            const roleColor  = { owner: '#f59e0b', admin: '#8b5cf6', cashier: '#3b82f6' }[user.role] || '#3b82f6';
            const roleIcon   = { owner: '👑', admin: '👔', cashier: '💰' }[user.role] || '💰';

            document.getElementById('employeeModalTitle').innerHTML =
                `تعديل بيانات المستخدم &nbsp;<span style="font-size:12px;background:${roleColor}18;color:${roleColor};
                border-radius:8px;padding:2px 9px;font-weight:700;">${roleIcon} ${roleLabel}</span>`;
            document.getElementById('employeeName').value  = name;
            document.getElementById('employeePhone').value = phone;

            // أخفي حقل الدور فقط — الراتب ظاهر ومتاح للتعديل
            const { roleGroup, salaryGroup } = _getSysModalFields();
            if (roleGroup) roleGroup.style.display = 'none';
            if (salaryGroup) salaryGroup.style.display = '';

            // شيل required من الـ select عشان مخفي ومش محتاجه
            const roleSelect = document.getElementById('employeeRole');
            if (roleSelect) {
                roleSelect.removeAttribute('required');
                roleSelect.value = user.role || 'cashier'; // قيمة افتراضية
            }
            const salaryInput = document.getElementById('employeeSalary');
            if (salaryInput) {
                salaryInput.removeAttribute('required'); // مش إجباري لمستخدمي النظام
                salaryInput.value = parseFloat(user.salary) || '';
            }

            document.getElementById('employeeModal').classList.add('active');
        }

        async function deleteSystemUser(uidEnc) {
            try {
                if (typeof Auth !== 'undefined' && typeof Auth.canDelete === 'function' && !Auth.canDelete()) {
                    if (typeof Notification !== 'undefined') Notification.error('الحذف مسموح لصاحب المحل فقط');
                    return;
                }
            } catch (_) {}

            if (!confirm('هل أنت متأكد من حذف هذا المستخدم من النظام؟')) return;

                systemUsersForDisplay = users;

            renderEmployees();
            await loadTeamPerformance();
            if (typeof Notification !== 'undefined') Notification.success('تم حذف المستخدم بنجاح');

        // Handle Employee Form Submit
        async function handleEmployeeSubmit(event) {
            event.preventDefault();

            // ── حفظ مستخدم النظام (تعديل اسم ورقم تليفون فقط) ──
            if (editingSystemUserId) {
                const newName  = document.getElementById('employeeName').value.trim();
                const newPhone = document.getElementById('employeePhone').value.trim();
                const newSalary = parseFloat(document.getElementById('employeeSalary')?.value) || 0;
                try {
                    let users = JSON.parse(localStorage.getItem('users') || '[]');
                    const idx = users.findIndex(u =>
                        String(u.id || u.uid || u.username || '') === editingSystemUserId
                    );
                    if (idx !== -1) {
                        if (newName)  users[idx].displayName = newName;
                        users[idx].phone  = newPhone;
                        users[idx].salary = newSalary;
                        localStorage.setItem('users', JSON.stringify(users));
                        systemUsersForDisplay = users;
                    }
                } catch (e) {
                    console.error('Error saving system user:', e);
                }
                renderEmployees();
                // loadTeamPerformance(); // مخفية مؤقتاً
                closeEmployeeModal();
                if (typeof Notification !== 'undefined') Notification.success('تم تحديث بيانات المستخدم بنجاح');
                return;
            }

            // ── حفظ موظف عادي ──
            const role = document.getElementById('employeeRole').value;

            const empSalary = parseFloat(document.getElementById('employeeSalary').value) || 0;
            const employee = {
                id: editingEmployeeId || 'EMP' + Date.now(),
                name: document.getElementById('employeeName').value.trim(),
                phone: document.getElementById('employeePhone').value.trim(),
                role,
                salary:        empSalary,
                salary_amount: empSalary,   // ← يتوافق مع db-service عمود salary_amount
                salary_type:   'monthly',   // ← دايماً شهري
                createdAt: editingEmployeeId ? employees.find(e => e.id === editingEmployeeId)?.createdAt : new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            try {
                const localId = `local_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                employee._localId = localId;
                employee._synced = false;
                
                if (editingEmployeeId) {
                    const index = employees.findIndex(e => e.id === editingEmployeeId);
                    if (index !== -1) {
                        employees[index] = employee;
                    }
                } else {
                    employees.push(employee);
                }
                
                // Save to DBService
                if (window.DBService && typeof window.DBService.saveEmployee === 'function') {
                    try { await window.DBService.saveEmployee(employee); } catch(e) { console.error('DBService saveEmployee error:', e); }
                }

                // إضافة للمزامنة مع Firebase
                if (typeof window !== 'undefined' && window.SyncManager) {
                    window.SyncManager.addToSyncQueue('employees', editingEmployeeId ? 'update' : 'add', employee, localId);
                }


                await loadEmployees();
                closeEmployeeModal();
                
                if (typeof Notification !== 'undefined') {
                    Notification.success(editingEmployeeId ? 'تم تحديث الموظف بنجاح' : 'تم إضافة الموظف بنجاح');
                }
            } catch (error) {
                console.error('Error saving employee:', error);
                if (typeof Notification !== 'undefined') {
                    Notification.error('حدث خطأ أثناء حفظ الموظف');
                }
            }
        }
        
        // Search Employees
        function initSearch() {

            if (searchInput) {
                searchInput.addEventListener('input', (e) => {

                    const cards = document.querySelectorAll('.employee-card');
                    
                    cards.forEach(card => {

                    });

        // ===========================
        // 🏆 UNIFIED TEAM PERFORMANCE
        // كاشيرز: إيراداتهم من السيشنز اللي فتحوها
        // موظفين عاديين: إيرادات الشيفتات في أيام حضورهم
        // ===========================
        window._teamPeriod = 'month';

        window.loadTeamPerformance = async function(period) {
            if (period) window._teamPeriod = period;
            else period = window._teamPeriod || 'month';

            const container = document.getElementById('teamPerformance');
            if (!container) return;
            container.innerHTML = '<div style="text-align:center;padding:30px;color:#999;"><i class="fas fa-spinner fa-spin" style="font-size:24px;"></i><br>جاري التحميل...</div>';

            const _fmt = v => typeof Utils !== 'undefined' ? Utils.formatCurrency(v) : v.toFixed(2) + ' ج.م';

            try {
                // ── جيب كل الداتا ──
                let systemUsers = [], manualEmps = [], allSessions = [], allOrders = [], allAttendance = [];

                try {
                    systemUsers = window.DBService
                        ? (await window.DBService.getUsers() || [])
                        : JSON.parse(localStorage.getItem('users') || '[]');
                } catch(_) { try { systemUsers = JSON.parse(localStorage.getItem('users') || '[]'); } catch(__) {} }

                try {
                    manualEmps = window.DBService
                        ? (await window.DBService.getEmployees() || [])
                        : JSON.parse(localStorage.getItem('employees') || '[]');
                } catch(_) { try { manualEmps = JSON.parse(localStorage.getItem('employees') || '[]'); } catch(__) {} }

                try {
                    [allSessions, allOrders] = await Promise.all([
                        window.DBService ? window.DBService.getCashSessions() : [],
                        window.DBService ? window.DBService.getOrders()       : [],
                    ]);
                } catch(_) {}
                allSessions = allSessions || [];
                allOrders   = allOrders   || [];

                // ── DEBUG ──
                console.log('[PERF DEBUG] sessions:', allSessions.length, allSessions.map(s=>({id:s.id, opened_by:s.opened_by||s.cashier_name, date:(s.opened_at||'').slice(0,10)})));
                console.log('[PERF DEBUG] orders:', allOrders.length, allOrders.map(o=>({sid:o.session_id||o.sessionId, total:o.total})));
                console.log('[PERF DEBUG] sysUsers from localStorage:', JSON.parse(localStorage.getItem('users')||'[]').map(u=>({name:u.displayName||u.name, phone:u.phone, id:u.id||u.uid})));

                // SQLite-first للحضور
                try {
                    if (window.DBService && typeof window.DBService.getAttendance === 'function') {
                        allAttendance = (await window.DBService.getAttendance({})) || [];
                    }
                } catch(_) {
                    try { allAttendance = JSON.parse(localStorage.getItem('attendance') || '[]'); } catch(__) {}
                }

                // ── نطاق الفترة ──
                const today = getBusinessDateSafe();
                let rangeStart = '';
                if (period === 'today') {
                    rangeStart = today;
                } else if (period === 'week') {
                    const d = new Date(`${today}T00:00:00`);
                    d.setDate(d.getDate() - 6);
                    rangeStart = new Intl.DateTimeFormat('en-CA').format(d);
                } else if (period === 'month') {
                    const d = new Date(`${today}T00:00:00`);
                    rangeStart = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
                } else {
                    rangeStart = '2000-01-01';
                }

                // ── فلترة السيشنز ──
                const filteredSessions = allSessions.filter(s => {
                    const d = s.business_date || s.businessDate || (s.opened_at || '').split('T')[0] || '';
                    return d >= rangeStart && d <= today;
                });

                // بناء maps
                const dateSessionMap = {}; // date → sessions[]
                filteredSessions.forEach(s => {
                    const d = s.business_date || s.businessDate || (s.opened_at || '').split('T')[0] || '';
                    if (!d) return;
                    if (!dateSessionMap[d]) dateSessionMap[d] = [];
                    dateSessionMap[d].push(s);
                });

                const rangeSessionIds = new Set(filteredSessions.map(s => String(s.id)));
                const filteredOrders = allOrders.filter(o =>
                    rangeSessionIds.has(String(o.session_id || o.sessionId || ''))
                );

                const sessionRevMap = {};    // sessionId → total revenue
                const sessionOrdMap = {};   // sessionId → order count
                filteredOrders.forEach(o => {
                    const sid = String(o.session_id || o.sessionId || '');
                    if (!sid) return;
                    sessionRevMap[sid] = (sessionRevMap[sid] || 0) + (parseFloat(o.total) || 0);
                    sessionOrdMap[sid] = (sessionOrdMap[sid] || 0) + 1;
                });

                const filteredAttendance = allAttendance.filter(r => {
                    const d = String(r.businessDate ?? r.business_date ?? '');
                    return d >= rangeStart && d <= today;
                });

                // ── بناء قائمة الأشخاص الموحدة ──
                const SYS_ROLE_COLORS  = { owner: '#f59e0b', admin: '#8b5cf6', cashier: '#3b82f6' };
                const SYS_ROLE_LABELS  = { owner: 'مالك', admin: 'مدير', cashier: 'كاشير' };
                const SYS_ROLE_ICONS   = { owner: '👑', admin: '👔', cashier: '💰' };
                const EMP_ROLE_COLORS  = { 'طباخ': '#ef4444', 'نادل': '#10b981', 'مدير': '#8b5cf6', 'كاشير': '#3b82f6' };
                const EMP_ROLE_ICONS   = { 'طباخ': '🍳', 'نادل': '🧑‍🍽️', 'مدير': '👔', 'كاشير': '💰' };

                const sysPersons = systemUsers
                    .filter(u => u.displayName || u.name || u.username)
                    .map(u => {
                        // اجمع كل الأسماء/المعرّفات الممكنة عشان نطابق بيها السيشن
                        const identifiers = new Set(
                            [u.displayName, u.name, u.username, u.phone, u.id, u.uid]
                            .filter(Boolean).map(v => String(v).trim())
                        );
                        return {
                            id:           String(u.id || u.uid || u.username || ''),
                            name:         u.displayName || u.name || u.username || '',
                            role:         u.role || 'cashier',
                            isSystemUser: true,
                            roleLabel:    SYS_ROLE_LABELS[u.role] || u.role || 'كاشير',
                            roleIcon:     SYS_ROLE_ICONS[u.role]  || '💰',
                            roleColor:    SYS_ROLE_COLORS[u.role] || '#3b82f6',
                            _identifiers: identifiers,  // ← كل المعرّفات للمطابقة
                        };
                    });

                const sysNamesLc = new Set(sysPersons.map(p => p.name.toLowerCase()));

                const empPersons = manualEmps
                    .filter(e => e.name && !sysNamesLc.has((e.name || '').toLowerCase()))
                    .map(e => ({
                        id:           String(e.id || ''),
                        name:         e.name || '',
                        role:         e.role || 'موظف',
                        isSystemUser: false,
                        salary:       parseFloat(e.salary) || 0,
                        roleLabel:    e.role || 'موظف',
                        roleIcon:     EMP_ROLE_ICONS[e.role]  || '👤',
                        roleColor:    EMP_ROLE_COLORS[e.role] || '#64748b',
                    }));

                const allPersons = [...sysPersons, ...empPersons];

                // ── حساب الإحصائيات لكل شخص ──
                const personStats = allPersons.map(person => {
                    let participatedRevenue = 0;
                    let participatedOrders  = 0;
                    let participatedSessions = 0;
                    let presentDays = 0;

                    if (person.isSystemUser) {
                        // الكاشير/المالك: حضوره = السيشنز اللي فتحها
                        // نطابق بأي identifier (اسم، يوزرنيم، تليفون، id)
                        const ids = person._identifiers || new Set([person.name]);
                        const mySessions = filteredSessions.filter(s => {
                            const ob = String(s.cashier_name || s.cashierName || s.opened_by || s.openedBy || '').trim();
                            return ob && ids.has(ob);
                        });
                        const myDates = new Set(mySessions.map(s =>
                            s.business_date || s.businessDate || (s.opened_at || '').split('T')[0]
                        ));
                        presentDays = myDates.size;
                        participatedSessions = mySessions.length;
                        mySessions.forEach(s => {
                            const sid = String(s.id);
                            participatedRevenue += sessionRevMap[sid] || 0;
                            participatedOrders  += sessionOrdMap[sid]  || 0;
                        });
                    } else {
                        // الموظف العادي: حضوره = سجلات الحضور بـ status=present
                        const personAtt = filteredAttendance.filter(r => {
                            const pid = String(r.employeeId ?? r.employee_id ?? '');
                            return pid === person.id && normalizeStatus(r.status) === 'present';
                        });
                        const presentDatesSet = new Set(personAtt.map(r =>
                            String(r.businessDate ?? r.business_date ?? '')
                        ));
                        presentDays = presentDatesSet.size;

                        presentDatesSet.forEach(date => {
                            (dateSessionMap[date] || []).forEach(s => {
                                const sid = String(s.id);
                                participatedRevenue += sessionRevMap[sid] || 0;
                                participatedOrders  += sessionOrdMap[sid]  || 0;
                                participatedSessions++;
                            });
                        });
                    }

                    return {
                        ...person,
                        presentDays,
                        participatedRevenue,
                        participatedOrders,
                        participatedSessions,
                        avgOrder: participatedOrders > 0 ? participatedRevenue / participatedOrders : 0,
                    };
                }).sort((a, b) => b.participatedRevenue - a.participatedRevenue);

                // ── DEBUG ──
                console.log('[PERF DEBUG] filteredSessions:', filteredSessions.length, 'sessionRevMap:', sessionRevMap);
                console.log('[PERF DEBUG] allPersons:', allPersons.map(p=>({name:p.name, ids:[...( p._identifiers||new Set())]})));
                console.log('[PERF DEBUG] personStats:', personStats.map(p=>({name:p.name, rev:p.participatedRevenue, sessions:p.participatedSessions, days:p.presentDays})));

                // ── إجمالي الفترة ──
                const totalRev = filteredSessions.reduce((s, sess) => s + (sessionRevMap[String(sess.id)] || 0), 0);
                const totalSessions = filteredSessions.length;
                const topPerson = personStats.find(p => p.participatedRevenue > 0);

                const maxRev = Math.max(...personStats.map(p => p.participatedRevenue), 1);

                // ── Period Filter Tabs ──
                const periodMeta = [
                    { key: 'today', label: 'اليوم' },
                    { key: 'week',  label: 'الأسبوع' },
                    { key: 'month', label: 'الشهر' },
                    { key: 'all',   label: 'الكل' },
                ];
                const filterHtml = `
                <div style="display:flex;gap:5px;margin-bottom:20px;background:#f0f0f0;border-radius:14px;padding:4px;">
                    ${periodMeta.map(p => `
                        <button onclick="loadTeamPerformance('${p.key}')"
                                style="flex:1;padding:9px 4px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px;
                                       font-family:inherit;transition:all .2s;
                                       background:${period === p.key ? '#000' : 'transparent'};
                                       color:${period === p.key ? '#fff' : '#888'};">
                            ${p.label}
                        </button>
                    `).join('')}
                </div>`;

                // ── KPI Cards ──
                const kpiHtml = `
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;">
                    <div style="background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);border-radius:16px;padding:16px;text-align:center;">
                        <div style="font-size:11px;color:#94a3b8;margin-bottom:5px;letter-spacing:.5px;">💰 إجمالي الإيرادات</div>
                        <div style="font-size:17px;font-weight:900;color:#34d399;">${_fmt(totalRev)}</div>
                    </div>
                    <div style="background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);border-radius:16px;padding:16px;text-align:center;">
                        <div style="font-size:11px;color:#94a3b8;margin-bottom:5px;letter-spacing:.5px;">🔄 الشيفتات</div>
                        <div style="font-size:20px;font-weight:900;color:#60a5fa;">${totalSessions}</div>
                    </div>
                    <div style="background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);border-radius:16px;padding:16px;text-align:center;">
                        <div style="font-size:11px;color:#94a3b8;margin-bottom:5px;letter-spacing:.5px;">🏆 الأعلى أداءً</div>
                        <div style="font-size:14px;font-weight:900;color:#fbbf24;">${topPerson ? topPerson.roleIcon + ' ' + topPerson.name : '—'}</div>
                    </div>
                </div>`;

                // ── Empty state ──
                if (!personStats.length || personStats.every(p => p.participatedRevenue === 0 && p.presentDays === 0)) {
                    container.innerHTML = filterHtml + kpiHtml + `
                    <div style="text-align:center;padding:40px 20px;background:#f9fafb;border-radius:20px;border:2px dashed #e5e7eb;">
                        <div style="font-size:48px;margin-bottom:14px;">📊</div>
                        <div style="font-weight:800;font-size:17px;color:#000;">لا توجد بيانات في هذه الفترة</div>
                        <div style="font-size:13px;color:#aaa;margin-top:8px;">افتح شيفت وسجّل حضور الموظفين لتظهر الإحصائيات هنا</div>
                    </div>`;
                    return;
                }

                // ── Podium (Top 3) ──
                const top3 = personStats.filter(p => p.participatedRevenue > 0).slice(0, 3);
                let podiumHtml = '';
                if (top3.length > 0) {
                    // ترتيب العرض: 2nd — 1st — 3rd (الوسط أعلى)
                    const display = top3.length === 1 ? [top3[0]] :
                                    top3.length === 2 ? [top3[1], top3[0]] :
                                    [top3[1], top3[0], top3[2]];

                    const heights  = top3.length === 1 ? ['90px'] :
                                     top3.length === 2 ? ['70px','100px'] :
                                     ['70px','100px','50px'];

                    const podColors = ['#c0c0c0', '#fbbf24', '#cd7c3b']; // silver, gold, bronze
                    const medals    = ['🥈', '🥇', '🥉'];
                    const ranks     = [2, 1, 3];

                    const itemsData = display.map((person, di) => ({
                        person,
                        height:  heights[di],
                        podColor: di === 1 ? podColors[1] : di === 0 ? podColors[0] : podColors[2],
                        medal:   di === 1 ? medals[1] : di === 0 ? medals[0] : medals[2],
                        rank:    di === 1 ? ranks[1] : di === 0 ? ranks[0] : ranks[2],
                    }));

                    podiumHtml = `
                    <div style="margin-bottom:24px;background:linear-gradient(180deg,#fafafa,#fff);border-radius:20px;padding:20px 16px 0;">
                        <div style="text-align:center;font-weight:800;font-size:14px;color:#666;margin-bottom:20px;letter-spacing:.5px;">🏆 قائمة الشرف — ${period === 'today' ? 'اليوم' : period === 'week' ? 'هذا الأسبوع' : period === 'month' ? 'هذا الشهر' : 'كل الوقت'}</div>
                        <div style="display:flex;align-items:flex-end;justify-content:center;gap:10px;">
                            ${itemsData.map(item => `
                            <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;max-width:110px;">
                                <!-- Avatar -->
                                <div style="width:52px;height:52px;border-radius:50%;
                                    background:${item.person.roleColor}22;border:2.5px solid ${item.person.roleColor};
                                    color:${item.person.roleColor};display:flex;align-items:center;justify-content:center;
                                    font-weight:900;font-size:22px;box-shadow:0 4px 12px ${item.person.roleColor}44;">
                                    ${item.person.name.charAt(0).toUpperCase()}
                                </div>
                                <!-- Info -->
                                <div style="text-align:center;">
                                    <div style="font-size:12px;font-weight:800;color:#000;">${item.medal} ${item.person.name.split(' ')[0]}</div>
                                    <div style="font-size:10px;color:${item.person.roleColor};font-weight:700;">${item.person.roleLabel}</div>
                                    <div style="font-size:11px;color:#16a34a;font-weight:800;margin-top:2px;">${_fmt(item.person.participatedRevenue)}</div>
                                </div>
                                <!-- Podium block -->
                                <div style="width:100%;height:${item.height};
                                    background:linear-gradient(180deg,${item.podColor},${item.podColor}bb);
                                    border-radius:8px 8px 0 0;
                                    display:flex;align-items:center;justify-content:center;
                                    color:#fff;font-weight:900;font-size:22px;
                                    box-shadow:0 -4px 10px ${item.podColor}55;">
                                    ${item.rank}
                                </div>
                            </div>`).join('')}
                        </div>
                    </div>`;
                }

                // ── Full Ranked List ──
                const listHtml = `
                <div style="display:grid;gap:10px;margin-top:${top3.length > 0 ? '16px' : '0'};">
                    ${personStats.map((person, i) => {
                        const pct = maxRev > 0 ? Math.round((person.participatedRevenue / maxRev) * 100) : 0;
                        const isTop = i === 0, is2nd = i === 1, is3rd = i === 2;
                        const medal = isTop ? '🥇' : is2nd ? '🥈' : is3rd ? '🥉' : '';
                        const bgCard = isTop ? '#fffbeb' : is2nd ? '#f8faff' : is3rd ? '#fff8f0' : '#fff';
                        const borderRight = person.roleColor;
                        const hasNoData = person.participatedRevenue === 0 && person.presentDays === 0;

                        return `
                        <div style="background:${bgCard};border:1px solid #e8e8e8;border-radius:16px;padding:14px 16px;
                                    border-right:4px solid ${borderRight};
                                    opacity:${hasNoData ? '0.55' : '1'};
                                    transition:box-shadow .2s;"
                             onmouseover="if(!this.style.opacity||this.style.opacity!='0.55')this.style.boxShadow='0 4px 18px rgba(0,0,0,.09)'"
                             onmouseout="this.style.boxShadow='none'">

                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${hasNoData ? '0' : '10px'};">
                                <!-- يسار: أفاتار + اسم -->
                                <div style="display:flex;align-items:center;gap:10px;">
                                    <div style="position:relative;">
                                        <div style="width:44px;height:44px;border-radius:50%;
                                            background:${person.roleColor}20;border:2px solid ${person.roleColor};
                                            color:${person.roleColor};display:flex;align-items:center;justify-content:center;
                                            font-weight:900;font-size:19px;">
                                            ${person.name.charAt(0).toUpperCase()}
                                        </div>
                                        ${medal ? `<div style="position:absolute;top:-6px;right:-6px;font-size:16px;">${medal}</div>` : `<div style="position:absolute;top:-4px;right:-5px;background:#e5e7eb;color:#555;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;">${i+1}</div>`}
                                    </div>
                                    <div>
                                        <div style="font-weight:800;font-size:14px;color:#000;margin-bottom:3px;">${person.name}</div>
                                        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
                                            <span style="font-size:11px;background:${person.roleColor}18;color:${person.roleColor};
                                                border-radius:6px;padding:1px 7px;font-weight:700;">
                                                ${person.roleIcon} ${person.roleLabel}
                                            </span>
                                            ${person.isSystemUser ? '<span style="font-size:10px;background:#f5f5f5;color:#999;border-radius:5px;padding:1px 5px;">⚙️ نظام</span>' : ''}
                                        </div>
                                    </div>
                                </div>
                                <!-- يمين: ايرادات + تفاصيل -->
                                <div style="text-align:left;min-width:120px;">
                                    ${hasNoData
                                        ? `<div style="font-size:12px;color:#aaa;text-align:center;">لم يُسجَّل حضور</div>`
                                        : `<div style="font-weight:900;color:#16a34a;font-size:15px;">${_fmt(person.participatedRevenue)}</div>
                                           <div style="font-size:11px;color:#888;margin-top:2px;">
                                               ${person.presentDays} يوم • ${person.participatedSessions} شيفت • ${person.participatedOrders} طلب
                                           </div>`
                                    }
                                </div>
                            </div>

                            ${!hasNoData ? `
                            <!-- Progress bar -->
                            <div style="background:#f0f0f0;border-radius:6px;height:7px;overflow:hidden;">
                                <div style="height:100%;width:${pct}%;background:${person.roleColor};border-radius:6px;
                                    transition:width .7s cubic-bezier(.4,0,.2,1);"></div>
                            </div>
                            <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#aaa;">
                                <span>متوسط الطلب: <strong style="color:#333;">${_fmt(person.avgOrder)}</strong></span>
                                <span>${pct}% من الإجمالي</span>
                            </div>` : ''}

                        </div>`;
                    }).join('')}
                </div>`;

                container.innerHTML = filterHtml + kpiHtml + podiumHtml + listHtml;

            } catch(err) {
                console.error('[loadTeamPerformance]', err);
                container.innerHTML = `
                    ${`<div style="display:flex;gap:5px;margin-bottom:20px;background:#f0f0f0;border-radius:14px;padding:4px;">
                        ${['today','week','month','all'].map(p => `<button onclick="loadTeamPerformance('${p}')" style="flex:1;padding:9px;border:none;border-radius:10px;font-weight:700;cursor:pointer;background:${period===p?'#000':'transparent'};color:${period===p?'#fff':'#888'};">${{today:'اليوم',week:'الأسبوع',month:'الشهر',all:'الكل'}[p]}</button>`).join('')}
                    </div>`}
                    <div style="color:#e74c3c;text-align:center;padding:20px;">حدث خطأ أثناء التحميل</div>`;
            }
        };

        // Alias for backward compat (delete handler calls this)
        async function loadTeamPerformance(p) { return window.loadTeamPerformance(p); }

        // ===========================
        // Attendance Summary (Business Month)
        // ===========================
        function getBusinessDateSafe() {
            try {
                if (typeof DataManager !== 'undefined' && typeof DataManager.getBusinessDate === 'function') {
                    return DataManager.getBusinessDate();
                }
            } catch (_) { /* ignore */ }
            try {
                return new Intl.DateTimeFormat('en-CA', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date());
            } catch (_) {
                const d = new Date();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                return `${d.getFullYear()}-${mm}-${dd}`;
            }
        }

        function monthRangeFromBusinessDate(businessDate) {
            const d = new Date(`${businessDate}T00:00:00`);
            const start = new Date(d.getFullYear(), d.getMonth(), 1);
            const end = new Date(d.getFullYear(), d.getMonth() + 1, 0); // last day
            const fmt = (x) => new Intl.DateTimeFormat('en-CA', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(x);
            return { startStr: fmt(start), endStr: fmt(end) };
        }

        function normalizeStatus(s) {
            const v = String(s || '').toLowerCase();
            if (v === 'present') return 'present';
            if (v === 'vacation') return 'vacation';
            return 'absent';
        }

        async function loadAttendanceSummary() {
            const businessDate = getBusinessDateSafe();
            const dateEl = document.getElementById('attendanceMonthBusinessDate');
            if (dateEl) dateEl.textContent = businessDate;

            const container = document.getElementById('attendanceSummary');
            if (!container) return;

            const { startStr, endStr } = monthRangeFromBusinessDate(businessDate);

            let records = [];
            // SQLite أولاً
            try {
                if (window.DBService && typeof window.DBService.getAttendance === 'function') {
                    const all = (await window.DBService.getAttendance({})) || [];
                    const filtered = all.filter(r => {
                        const d = String(r.businessDate ?? r.business_date ?? '');
                        return d >= startStr && d <= endStr;
                    });
                    if (filtered.length > 0) records = filtered;
                }
            } catch (e) {
                console.warn('[loadAttendanceSummary] SQLite:', e.message);
            }
            // Fallback localStorage
            if (!Array.isArray(records) || records.length === 0) {
                try {
                    const local = JSON.parse(localStorage.getItem('attendance') || '[]');
                    records = local.filter(r => {
                        const d = String(r.businessDate ?? r.business_date ?? '');
                        return d >= startStr && d <= endStr;
                    });
                } catch (_) {
                    records = [];
                }
            }
            // Firebase آخر خيار (اونلاين فقط)
            if (!records.length && typeof window !== 'undefined' && window.FirestoreService && navigator.onLine) {
                try {
                    if (typeof window.FirestoreService.getAttendanceByRange === 'function') {
                        records = await window.FirestoreService.getAttendanceByRange(startStr, endStr) || [];
                    }
                } catch (e) {
                    console.warn('Error loading attendance from Firebase:', e);
                }
            }

            // دمج المستخدمين من النظام مع الموظفين العاديين
            const SYS_LABELS = { owner: 'مالك', admin: 'مدير', cashier: 'كاشير' };
            const SYS_COLORS = { owner: '#f59e0b', admin: '#8b5cf6', cashier: '#3b82f6' };
            const EMP_COLORS = { 'طباخ': '#ef4444', 'نادل': '#10b981', 'مدير': '#8b5cf6', 'كاشير': '#3b82f6' };

            const sysAsEmps = (systemUsersForDisplay || [])
                .filter(u => u.displayName || u.name || u.username)
                .map(u => ({
                    id:       String(u.id || u.uid || u.username || ''),
                    name:     u.displayName || u.name || u.username || '',
                    role:     SYS_LABELS[u.role] || u.role || 'كاشير',
                    color:    SYS_COLORS[u.role] || '#3b82f6',
                    isSystem: true,
                }));
            const sysNamesLc = new Set(sysAsEmps.map(e => e.name.toLowerCase()));
            const manualAsEmps = (employees || [])
                .filter(e => !sysNamesLc.has((e.name || '').toLowerCase()))
                .map(e => ({
                    id:       String(e.id ?? ''),
                    name:     e.name || '',
                    role:     e.role || 'موظف',
                    color:    EMP_COLORS[e.role] || '#64748b',
                    isSystem: false,
                }));
            const allForAttendance = [...sysAsEmps, ...manualAsEmps];

            if (!allForAttendance.length) {
                container.innerHTML = '<div style="text-align:center; color:#999999; padding: var(--spacing-md);">لا يوجد موظفين أو مستخدمين</div>';
                return;
            }

            const byEmp = new Map();
            records.forEach(r => {
                const empId = String(r.employeeId ?? r.employee_id ?? '');
                if (!empId) return;
                if (!byEmp.has(empId)) byEmp.set(empId, []);
                byEmp.get(empId).push({ ...r, status: normalizeStatus(r.status) });
            });

            container.innerHTML = allForAttendance.map(emp => {
                const empId   = String(emp.id ?? '');
                const list    = byEmp.get(empId) || [];
                const present  = list.filter(x => x.status === 'present').length;
                const absent   = list.filter(x => x.status === 'absent').length;
                const vacation = list.filter(x => x.status === 'vacation').length;
                const total    = present + absent + vacation;
                const pct      = total > 0 ? Math.round((present / total) * 100) : 0;

                return `
                    <div style="border:1px solid #e8e8e8;border-radius:14px;padding:14px;background:#fff;
                                display:flex;justify-content:space-between;align-items:center;gap:12px;
                                border-right:4px solid ${emp.color};">
                        <div style="flex:1;">
                            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                                <div style="width:32px;height:32px;border-radius:50%;
                                    background:${emp.color}18;color:${emp.color};border:1.5px solid ${emp.color}44;
                                    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;">
                                    ${emp.name.charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <div style="font-weight:800;color:#000;font-size:14px;">${emp.name}</div>
                                    <div style="font-size:11px;color:${emp.color};font-weight:700;">
                                        ${emp.role}${emp.isSystem ? ' &nbsp;<span style="background:#f5f5f5;color:#aaa;border-radius:4px;padding:0 4px;font-size:10px;">نظام</span>' : ''}
                                    </div>
                                </div>
                            </div>
                            <div style="display:flex;gap:6px;flex-wrap:wrap;font-size:12px;margin-bottom:6px;">
                                <span style="padding:4px 8px;border-radius:8px;background:#e8f5e9;color:#27AE60;font-weight:800;">✅ ${present}</span>
                                <span style="padding:4px 8px;border-radius:8px;background:#ffebee;color:#E74C3C;font-weight:800;">❌ ${absent}</span>
                                <span style="padding:4px 8px;border-radius:8px;background:#e3f2fd;color:#2980B9;font-weight:800;">🏖️ ${vacation}</span>
                                ${total > 0 ? `<span style="padding:4px 8px;border-radius:8px;background:#fef9c3;color:#92400e;font-weight:800;">📊 ${pct}%</span>` : ''}
                            </div>
                            ${total > 0 ? `
                            <div style="background:#f0f0f0;border-radius:4px;height:5px;overflow:hidden;">
                                <div style="height:100%;width:${pct}%;background:${emp.color};border-radius:4px;transition:width .5s;"></div>
                            </div>` : ''}
                        </div>
                        <div>
                            <button class="btn btn-secondary" type="button" style="padding:8px 12px;font-size:13px;"
                                onclick="openAttendanceDetails('${encodeURIComponent(empId)}','${encodeURIComponent(emp.name || '')}','${startStr}','${endStr}')">
                                التفاصيل
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.openAttendanceDetails = async function(empIdEnc, empNameEnc, startStr, endStr) {
            const empId = decodeURIComponent(empIdEnc || '');
            const empName = decodeURIComponent(empNameEnc || '') || 'الموظف';
            const titleEl = document.getElementById('attendanceDetailsTitle');
            const bodyEl = document.getElementById('attendanceDetailsBody');
            const modal = document.getElementById('attendanceDetailsModal');
            if (titleEl) titleEl.textContent = `تفاصيل الحضور: ${empName}`;
            if (!bodyEl || !modal) return;

            bodyEl.innerHTML = '<div style="text-align:center; color:#999999; padding: var(--spacing-lg);">جاري التحميل...</div>';

            let records = [];
            if (typeof window !== 'undefined' && window.FirestoreService && navigator.onLine) {
                try {
                    if (typeof window.FirestoreService.getAttendanceByRange === 'function') {
                        const all = await window.FirestoreService.getAttendanceByRange(startStr, endStr);
                        records = Array.isArray(all) ? all.filter(r => String(r.employeeId) === String(empId)) : [];
                    }
                } catch (e) {
                    console.warn('Error loading attendance details from Firebase:', e);
                }
            }
            if (!records.length) {
                try {
                    const local = JSON.parse(localStorage.getItem('attendance') || '[]');
                    records = local.filter(r =>
                        String(r.employeeId) === String(empId) &&
                        String(r.businessDate) >= String(startStr) &&
                        String(r.businessDate) <= String(endStr)
                    );
                } catch (_) {
                    records = [];
                }
            }

            const statusLabel = (s) => s === 'present' ? 'حاضر' : (s === 'vacation' ? 'إجازة' : 'غائب');
            const statusColor = (s) => s === 'present' ? '#27AE60' : (s === 'vacation' ? '#2980B9' : '#E74C3C');
            const byDate = new Map(records.map(r => [String(r.businessDate), normalizeStatus(r.status)]));

            // Build full month days list
            const start = new Date(`${startStr}T00:00:00`);
            const end = new Date(`${endStr}T00:00:00`);
            const days = [];
            for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                const ds = new Intl.DateTimeFormat('en-CA', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(d);
                days.push(ds);
            }

            bodyEl.innerHTML = days.map(ds => {
                const st = byDate.get(ds) || 'absent';
                return `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding: 12px; border:1px solid #e8e8e8; border-radius: 12px; background:#ffffff;">
                        <div style="font-weight:800; color:#000000;">${ds}</div>
                        <div style="font-weight:900; color:${statusColor(st)};">${statusLabel(st)}</div>
                    </div>
                `;
            }).join('');

            modal.classList.add('active');
        };

        window.closeAttendanceDetails = function() {
            const modal = document.getElementById('attendanceDetailsModal');
            if (modal) modal.classList.remove('active');
        };
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await loadEmployees(); // تحميل فوري من localStorage
            initSearch();
            await loadAttendanceSummary();
        });

        // بعد ما SaaS يخلص (Firebase Auth جاهز + _saasUid متسجل) → حدّث البيانات من Firebase
        window.addEventListener('saas-ready', async () => {
            if (employees.length === 0) {
                // Force reload from DataManager/Firebase
                await loadEmployees();
                await loadAttendanceSummary();
            }
        });
    </script>

    <script src="saas/sidebar.js"></script>
    <script src="saas/onboarding-ui.js"></script>
    <script src="saas/plans-ui.js"></script>
    <script src="saas/auth-ui.js"></script>
    <script src="saas/subscription-manager.js"></script>

</body>
</html>
