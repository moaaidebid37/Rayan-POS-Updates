<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسح الطلبات الوهمية</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #e74c3c;
            margin-bottom: 20px;
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 14px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #e74c3c;
            color: white;
            margin: 10px;
            transition: all 0.3s;
        }
        button:hover {
            background-color: #c0392b;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/notifications.js"></script>
</head>
<body>
    <div class="container">
        <h1>🗑️ مسح الطلبات الوهمية</h1>
        <div id="status" class="status">جاري التحضير...</div>
        <button id="clearBtn" onclick="clearAllOrdersNow()">مسح جميع الطلبات</button>
        <button onclick="window.location.href='index.html'">العودة للرئيسية</button>
    </div>

    <script>
        async function clearAllOrdersNow() {
            const statusEl = document.getElementById('status');
            const clearBtn = document.getElementById('clearBtn');
            
            clearBtn.disabled = true;
            statusEl.textContent = 'جاري مسح الطلبات...';
            statusEl.className = 'status';
            
            try {
                // 1. مسح من localStorage
                const orderKeys = ['orders', 'ordersOnHold', 'salesHistory', 'resumeOrder'];
                let localCount = 0;
                
                orderKeys.forEach(key => {
                    const data = localStorage.getItem(key);
                    if (data) {
                        try {
                            const parsed = JSON.parse(data);
                            if (Array.isArray(parsed)) {
                                localCount += parsed.length;
                            }
                        } catch(e) {}
                    }
                    localStorage.removeItem(key);
                    if (key !== 'resumeOrder') {
                        localStorage.setItem(key, JSON.stringify([]));
                    }
                });
                
                statusEl.textContent = `✅ تم مسح ${localCount} طلب من localStorage`;
                statusEl.className = 'status success';
                
                // 2. مسح من Firebase
                if (typeof window !== 'undefined' && typeof window.FirestoreService !== 'undefined' && navigator.onLine) {
                    try {
                        statusEl.textContent = 'جاري مسح الطلبات من Firebase...';
                        const firebaseOrders = await window.FirestoreService.getAllOrders();
                        let deletedCount = 0;
                        
                        for (const order of firebaseOrders) {
                            try {
                                await window.FirestoreService.deleteOrder(order.id);
                                deletedCount++;
                            } catch (e) {
                                console.warn(`فشل حذف طلب ${order.id}:`, e);
                            }
                        }
                        
                        statusEl.textContent = `✅ تم مسح ${localCount} طلب من localStorage و ${deletedCount} طلب من Firebase`;
                        statusEl.className = 'status success';
                    } catch (error) {
                        console.error('خطأ في مسح Firebase:', error);
                        statusEl.textContent = `✅ تم مسح ${localCount} طلب من localStorage (خطأ في Firebase)`;
                        statusEl.className = 'status success';
                    }
                } else {
                    statusEl.textContent = `✅ تم مسح ${localCount} طلب من localStorage (Firebase غير متاح)`;
                    statusEl.className = 'status success';
                }
                
                // 3. تعطيل دمج Firebase لمدة 30 دقيقة
                localStorage.setItem('_ordersCleared', Date.now().toString());
                
                // 4. إعادة التوجيه بعد 2 ثانية
                setTimeout(() => {
                    window.location.href = 'orders.html';
                }, 2000);
                
            } catch (error) {
                console.error('خطأ:', error);
                statusEl.textContent = '❌ حدث خطأ: ' + error.message;
                statusEl.className = 'status error';
                clearBtn.disabled = false;
            }
        }
        
        // تشغيل تلقائي عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(clearAllOrdersNow, 500);
        });
    </script>

        <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    <script src="saas/sidebar.js"></script>
    <script src="saas/plans-ui.js"></script>
    <script src="saas/auth-ui.js"></script>
    <script src="saas/subscription-manager.js"></script>
    <script>
    // ═══════════════════════════════════════════════════════
    // SaaS Feature Gates — إخفاء الصفحات حسب الباقة
    // ═══════════════════════════════════════════════════════
    window.addEventListener('saas-ready', function () {

        // ── الصفحات المقفولة على Basic فأكثر ──────────────
        if (!window.SaaS.canUse('reports')) {
            document.querySelector('a[href="reports.html"]')
                ?.style.setProperty('display', 'none', 'important');
        }
        if (!window.SaaS.canUse('customers')) {
            document.querySelector('a[href="customers.html"]')
                ?.style.setProperty('display', 'none', 'important');
        }

        // ── الصفحات المقفولة على Pro فقط ───────────────────
        if (!window.SaaS.canUse('whatsapp')) { // 'whatsapp' is a Pro feature
            document.querySelector('a[href="marketing.html"]')
                ?.style.setProperty('display', 'none', 'important');
        }
        
        // ── Badge ──────────────────────────────────────────
        const plan = window.SaaS.getPlan();
        const planLabel = window.SaaS.getPlanLabel();
        const endDate = window.SaaS.getEndDate();

        const sidebar = document.querySelector('.sidebar');
        if (sidebar && !document.getElementById('saas-plan-badge')) {
            const badge = document.createElement('div');
            badge.id = 'saas-plan-badge';

            const colors = { trial: '#4a9eff', basic: '#d4af37', pro: '#9b59b6', mega: '#e74c3c' };
            const color  = colors[plan] || '#d4af37';

            const daysLeft = endDate
                ? Math.max(0, Math.ceil((new Date(endDate) - new Date()) / 86400000))
                : null;

            badge.style.cssText = 'margin: 12px; padding: 12px 14px; background: ' + color + '15; border: 1px solid ' + color + '44; border-radius: 10px; font-size: 12px; text-align: center;';
            
            let badgeHTML = '<div style="color:' + color + '; font-weight:700; margin-bottom:4px;">' + (plan === 'mega' ? '🚀' : plan === 'pro' ? '👑' : plan === 'basic' ? '⭐' : '🕐') + ' ' + planLabel + '</div>';

            if (daysLeft !== null) {
                badgeHTML += '<div style="color:#888; font-size:11px;">' + daysLeft + ' يوم متبقي</div>';
            }

            if (plan !== 'mega') {
                badgeHTML += '<button onclick="window.SaaS.requireFeature(\'dashboard\')" style="margin-top:8px; width:100%; padding:6px; background:' + color + '; border:none; border-radius:6px; color:#000; font-size:11px; font-weight:700; cursor:pointer;">ترقية الباقة ↑</button>';
            }

            badge.innerHTML = badgeHTML;
            sidebar.appendChild(badge);
        }

    });
    </script>

</body>
</html>
