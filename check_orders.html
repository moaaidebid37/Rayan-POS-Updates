<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فحص الطلبات</title>
    <style>
        body {
            font-family: 'Cairo', Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { color: #e74c3c; }
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .order-item {
            background: #f9f9f9;
            padding: 10px;
            margin: 5px 0;
            border-radius: 6px;
            border-right: 3px solid #3498db;
        }
        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 فحص مصدر الطلبات</h1>
        <div id="results"></div>
        <button onclick="checkOrders()">فحص الطلبات</button>
        <button onclick="clearAll()" style="background: #c0392b;">مسح جميع الطلبات</button>
    </div>

    <script>
        async function checkOrders() {
            const results = document.getElementById('results');
            results.innerHTML = '<p>جاري الفحص...</p>';

            // فحص DBService (SQLite)
            const localOrders = window.DBService ? await window.DBService.getOrders() : [];
            const ordersOnHold = window.DBService ? await window.DBService.getOrdersOnHold() : [];
            const salesHistory = window.DBService ? await window.DBService.getSalesHistory() : [];
            const resumeOrder = localStorage.getItem('resumeOrder');

            let html = `
                <div class="info">
                    <h3>📊 إحصائيات الطلبات:</h3>
                    <ul>
                        <li><strong>الطلبات العادية (orders):</strong> ${localOrders.length} طلب</li>
                        <li><strong>الطلبات المعلقة (ordersOnHold):</strong> ${ordersOnHold.length} طلب</li>
                        <li><strong>تاريخ المبيعات (salesHistory):</strong> ${salesHistory.length} طلب</li>
                        <li><strong>طلب مستأنف (resumeOrder):</strong> ${resumeOrder ? 'موجود' : 'غير موجود'}</li>
                        <li><strong>المجموع الكلي:</strong> ${localOrders.length + ordersOnHold.length + salesHistory.length} طلب</li>
                    </ul>
                </div>
            `;

            // عرض عينة من الطلبات
            if (localOrders.length > 0) {
                html += '<h3>عينة من الطلبات العادية (أول 5):</h3>';
                localOrders.slice(0, 5).forEach(order => {
                    html += `
                        <div class="order-item">
                            <strong>ID:</strong> ${order.id || 'N/A'}<br>
                            <strong>التاريخ:</strong> ${order.date || 'N/A'}<br>
                            <strong>عدد المنتجات:</strong> ${(order.items || []).length}<br>
                            <strong>الإجمالي:</strong> ${order.total || 0} ج.م
                        </div>
                    `;
                });
            }

            // فحص Firebase
            if (typeof window !== 'undefined' && window.FirestoreService) {
                html += '<div class="info"><strong>Firebase:</strong> متاح - قد يكون هناك طلبات إضافية من Firebase</div>';
            } else {
                html += '<div class="info"><strong>Firebase:</strong> غير متاح - الطلبات من localStorage فقط</div>';
            }

            results.innerHTML = html;
        }

        function clearAll() {
            if (!confirm('هل أنت متأكد من مسح جميع الطلبات؟')) return;

            ['orders', 'ordersOnHold', 'salesHistory', 'resumeOrder'].forEach(key => {
                localStorage.removeItem(key);
                if (key !== 'resumeOrder') {
                    localStorage.setItem(key, JSON.stringify([]));
                }
            });

            alert('✅ تم مسح جميع الطلبات!');
            checkOrders();
        }

        // فحص تلقائي عند التحميل
        window.addEventListener('load', checkOrders);
    </script>

        <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    <script src="saas/sidebar.js"></script>
    <script src="saas/plans-ui.js"></script>
    <script src="saas/auth-ui.js"></script>
    <script src="saas/subscription-manager.js"></script>
    <script>
    // ═══════════════════════════════════════════════════════
    // SaaS Feature Gates — إخفاء الصفحات حسب الباقة
    // ═══════════════════════════════════════════════════════
    window.addEventListener('saas-ready', function () {

        // ── الصفحات المقفولة على Basic فأكثر ──────────────
        if (!window.SaaS.canUse('reports')) {
            document.querySelector('a[href="reports.html"]')
                ?.style.setProperty('display', 'none', 'important');
        }
        if (!window.SaaS.canUse('customers')) {
            document.querySelector('a[href="customers.html"]')
                ?.style.setProperty('display', 'none', 'important');
        }

        // ── الصفحات المقفولة على Pro فقط ───────────────────
        if (!window.SaaS.canUse('whatsapp')) { // 'whatsapp' is a Pro feature
            document.querySelector('a[href="marketing.html"]')
                ?.style.setProperty('display', 'none', 'important');
        }
        
        // ── Badge ──────────────────────────────────────────
        const plan = window.SaaS.getPlan();
        const planLabel = window.SaaS.getPlanLabel();
        const endDate = window.SaaS.getEndDate();

        const sidebar = document.querySelector('.sidebar');
        if (sidebar && !document.getElementById('saas-plan-badge')) {
            const badge = document.createElement('div');
            badge.id = 'saas-plan-badge';

            const colors = { trial: '#4a9eff', basic: '#d4af37', pro: '#9b59b6', mega: '#e74c3c' };
            const color  = colors[plan] || '#d4af37';

            const daysLeft = endDate
                ? Math.max(0, Math.ceil((new Date(endDate) - new Date()) / 86400000))
                : null;

            badge.style.cssText = 'margin: 12px; padding: 12px 14px; background: ' + color + '15; border: 1px solid ' + color + '44; border-radius: 10px; font-size: 12px; text-align: center;';
            
            let badgeHTML = '<div style="color:' + color + '; font-weight:700; margin-bottom:4px;">' + (plan === 'mega' ? '🚀' : plan === 'pro' ? '👑' : plan === 'basic' ? '⭐' : '🕐') + ' ' + planLabel + '</div>';

            if (daysLeft !== null) {
                badgeHTML += '<div style="color:#888; font-size:11px;">' + daysLeft + ' يوم متبقي</div>';
            }

            if (plan !== 'mega') {
                badgeHTML += '<button onclick="window.SaaS.requireFeature(\'dashboard\')" style="margin-top:8px; width:100%; padding:6px; background:' + color + '; border:none; border-radius:6px; color:#000; font-size:11px; font-weight:700; cursor:pointer;">ترقية الباقة ↑</button>';
            }

            badge.innerHTML = badgeHTML;
            sidebar.appendChild(badge);
        }

    });
    </script>

</body>
</html>
