<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموردين</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        * {
            font-family: 'Poppins', 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        body {
            background: #fafafa;
        }
        
        .sidebar {
            background: #ffffff;
            border-left: 1px solid #e8e8e8;
        }
        
        .sidebar-item {
            color: #000000;
        }
        
        .sidebar-item:hover {
            background: #f5f5f5;
        }
        
        .sidebar-item.active {
            background: #000000;
            color: #ffffff;
        }
        
        .header {
            background: #ffffff;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-lg);
            height: 80px;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: var(--spacing-lg);
        }
        
        .header-title {
            color: #000000;
            font-weight: 700;
            font-size: 24px;
            margin: 0;
            white-space: nowrap;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }
        
        .header-search {
            background: #fafafa;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 250px;
        }
        
        .header-search i {
            color: #999999;
            font-size: 14px;
        }
        
        .header-search input {
            border: none;
            background: transparent;
            outline: none;
            color: #000000;
            font-size: 14px;
            flex: 1;
        }
        
        .header-search input::placeholder {
            color: #999999;
        }
        
        .main-content {
            background: #fafafa;
            padding: var(--spacing-lg);
        }
        
        .suppliers-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-lg);
        }
        
        .suppliers-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }
        
        .suppliers-header h2 {
            color: #000000;
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }
        
        .suppliers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--spacing-lg);
        }
        
        .supplier-card {
            background: #ffffff;
            border-radius: 20px;
            padding: var(--spacing-lg);
            border: 1px solid #e8e8e8;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .supplier-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }
        
        .supplier-profile {
            display: flex;
            align-items: center;
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid #e8e8e8;
        }
        
        .supplier-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            margin-left: var(--spacing-md);
            flex-shrink: 0;
        }
        
        .supplier-info {
            flex: 1;
        }
        
        .supplier-name {
            font-size: 18px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 4px;
        }
        
        .supplier-company {
            font-size: 14px;
            color: #666666;
        }
        
        .supplier-details {
            margin-bottom: var(--spacing-md);
        }
        
        .supplier-detail-item {
            display: flex;
            align-items: center;
            margin-bottom: var(--spacing-sm);
            font-size: 14px;
            color: #000000;
        }
        
        .supplier-detail-item i {
            width: 20px;
            margin-left: var(--spacing-sm);
            color: #666666;
        }
        
        .supplier-actions {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
            padding-top: var(--spacing-md);
            border-top: 1px solid #e8e8e8;
        }
        
        .btn-call {
            flex: 1;
            padding: 10px;
            background: #000000;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .btn-call:hover {
            background: #333333;
            transform: scale(1.05);
        }

        .btn-whatsapp {
            padding: 10px 14px;
            background: #25D366;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-whatsapp:hover {
            background: #1ebe5d;
            transform: scale(1.05);
        }
        
        .btn-edit {
            padding: 10px 16px;
            background: #fafafa;
            color: #000000;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-edit:hover {
            background: #f5f5f5;
            border-color: #000000;
        }
        
        .btn-delete {
            padding: 10px 16px;
            background: #ffebee;
            color: #e74c3c;
            border: 1px solid #ffcdd2;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-delete:hover {
            background: #ffcdd2;
            border-color: #e74c3c;
        }
        
        .empty-state {
            text-align: center;
            padding: var(--spacing-2xl);
            color: #999999;
            font-size: 16px;
            grid-column: 1/-1;
        }
        
        .modal {
            background: rgba(0, 0, 0, 0.5);
        }
        
        .modal-content {
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid #e8e8e8;
            max-width: 500px;
        }
        
        .modal-title {
            color: #000000;
            font-weight: 700;
        }
        
        .modal-close {
            color: #999999;
        }
        
        .modal-close:hover {
            color: #000000;
        }
        
        .form-group {
            margin-bottom: var(--spacing-lg);
        }
        
        .label {
            display: block;
            margin-bottom: 8px;
            color: #000000;
            font-weight: 600;
            font-size: 14px;
        }
        
        .input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            background: #ffffff;
            color: #000000;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .input:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }
        
        .btn-primary {
            background: #000000;
            color: #ffffff;
        }
        
        .btn-secondary {
            background: #fafafa;
            color: #000000;
            border: 1px solid #e8e8e8;
        }

        /* كود إجبار الخانات على الكتابة والضغط */
        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            pointer-events: auto !important;
            user-select: text !important;
            -webkit-user-select: text !important;
            -webkit-app-region: no-drag !important;
            position: relative !important;
            z-index: 9999 !important;
        }
        .form-group {
            position: relative;
            z-index: 9998;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar"></nav>

        <div class="main-wrapper">
            <header class="header">
                <div class="header-content">
                    <img src="images/logo.png" class="header-logo" alt="Solo POS">
             <h2 class="header-title">الموردين</h2>
                    <div class="header-actions">
                        <div class="header-search">
                            <i class="fas fa-search"></i>
                            <input type="text" id="supplierSearch" placeholder="ابحث عن مورد...">
                        </div>
                        <button class="btn btn-primary" onclick="openAddSupplierModal()">
                            <i class="fas fa-plus" style="margin-left: 8px;"></i>
                            إضافة مورد
                        </button>
                    </div>
                </div>
            </header>

            <main class="main-content">
                <div class="suppliers-container">
                    <div class="suppliers-grid" id="suppliersGrid">
                        <div class="empty-state">لا يوجد موردين</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add/Edit Supplier Modal -->
    <div class="modal" id="supplierModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="supplierModalTitle">إضافة مورد جديد</h3>
                <button class="modal-close" onclick="closeSupplierModal()">×</button>
            </div>
            <form id="supplierForm" onsubmit="handleSupplierSubmit(event)">
                <div class="form-group">
                    <label class="label">اسم المورد *</label>
                    <input type="text" class="input" id="supplierName" placeholder="أدخل اسم المورد" required>
                </div>
                
                <div class="form-group">
                    <label class="label">رقم الهاتف (اختياري)</label>
                    <input type="tel" class="input" id="supplierPhone" placeholder="أدخل رقم الهاتف">
                </div>
                
                <div class="form-group">
                    <label class="label">بيبيع إيه (اختياري)</label>
                    <input type="text" class="input" id="supplierProducts" placeholder="مثال: مكرونة، فراخ، خضار...">
                </div>
                
                <div style="display: flex; gap: var(--spacing-md); margin-top: var(--spacing-xl);">
                    <button type="button" class="btn btn-secondary" onclick="closeSupplierModal()" style="flex: 1;">إلغاء</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">حفظ</button>
                </div>
            </form>
        </div>
    </div>


    <!-- Firebase and Core Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/firestore_service.js"></script>
    <script src="js/db-service.js"></script>
    <script src="js/sync_manager.js"></script>
    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>

    <script>
        // تهيئة Sync Manager
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof SyncManager !== 'undefined' && typeof SyncManager.init === 'function') {
                SyncManager.init();
            }
        });
        
        let suppliers = [];
        let editingSupplierId = null;
        
        // Check login and apply permissions
        if (typeof Auth !== 'undefined') {
            Auth.checkLogin();
            Auth.checkPageAccess('suppliers.html');
            Auth.applyPermissions();
        } else {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
            }
        }
        
        function logout() {
            if (typeof Auth !== 'undefined') {
                Auth.logout();
            } else {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('username');
                localStorage.removeItem('userType');
                window.location.href = 'login.html';
            }
        }
        
        // Load suppliers
        async function loadSuppliers() {
            try {
                suppliers = await DataManager.getSuppliers();
                renderSuppliers();
            } catch (error) {
                console.error('Error loading suppliers:', error);
                suppliers = [];
                renderSuppliers();
            }
        }
        
        // Render suppliers
        function renderSuppliers() {
            const grid = document.getElementById('suppliersGrid');
            if (!grid) return;
            
            if (suppliers.length === 0) {
                grid.innerHTML = '<div class="empty-state">لا يوجد موردين<br><small style="color: #999999; font-size: 14px;">اضغط على "إضافة مورد" لإضافة مورد جديد</small></div>';
                return;
            }
            
            grid.innerHTML = suppliers.map(supplier => {
                const initials = supplier.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                
                return `
                    <div class="supplier-card" data-supplier-id="${supplier.id}">
                        <div class="supplier-profile">
                            <div class="supplier-avatar">${initials}</div>
                            <div class="supplier-info">
                                <div class="supplier-name">${supplier.name}</div>
                            </div>
                        </div>
                        <div class="supplier-details">
                            <div class="supplier-detail-item">
                                <i class="fas fa-phone"></i>
                                <span>${supplier.phone}</span>
                            </div>
                            <div class="supplier-detail-item">
                                <i class="fas fa-box"></i>
                                <span>${supplier.products || 'غير محدد'}</span>
                            </div>
                        </div>
                        <div class="supplier-actions">
                            <button class="btn-call" onclick="callSupplier('${supplier.phone}')">
                                <i class="fas fa-phone"></i>
                                اتصال
                            </button>
                            <button class="btn-whatsapp" onclick="whatsappSupplier('${supplier.phone}')" title="واتساب">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                واتساب
                            </button>
                            <button class="btn-edit" onclick="editSupplier('${supplier.id}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-delete" onclick="deleteSupplier('${supplier.id}')" data-restricted="owner">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Open Add Supplier Modal
        function openAddSupplierModal() {
            editingSupplierId = null;
            document.getElementById('supplierModalTitle').textContent = 'إضافة مورد جديد';
            document.getElementById('supplierForm').reset();
            document.getElementById('supplierModal').classList.add('active');
        }
        
        // Close Supplier Modal
        function closeSupplierModal() {
            document.getElementById('supplierModal').classList.remove('active');
            editingSupplierId = null;
            document.getElementById('supplierForm').reset();
        }
        
        // Edit Supplier
        function editSupplier(id) {
            const supplier = suppliers.find(s => s.id === id);
            if (!supplier) return;
            
            editingSupplierId = id;
            document.getElementById('supplierModalTitle').textContent = 'تعديل مورد';
            document.getElementById('supplierName').value = supplier.name || '';
            document.getElementById('supplierPhone').value = supplier.phone || '';
            document.getElementById('supplierProducts').value = supplier.products || '';
            document.getElementById('supplierModal').classList.add('active');
        }
        
        // Delete Supplier
        async function deleteSupplier(id) {
            try {
                if (typeof Auth !== 'undefined' && typeof Auth.canDelete === 'function' && !Auth.canDelete()) {
                    if (typeof Notification !== 'undefined') Notification.error('الحذف مسموح لصاحب المحل فقط');
                    else alert('الحذف مسموح لصاحب المحل فقط');
                    return;
                }
            } catch (_) {}

            if (!confirm('هل أنت متأكد من حذف هذا المورد؟')) return;

            try {
                // Step 1: Tell DataManager to handle the deletion
                await DataManager.removeSupplier(id);

                // Step 2: Immediately remove the supplier card from the UI
                const supplierCard = document.querySelector(`.supplier-card[data-supplier-id="${id}"]`);
                if (supplierCard) {
                    supplierCard.classList.add('fade-out-and-remove');
                    setTimeout(() => supplierCard.remove(), 500); // Wait for animation
                }

                if (typeof Notification !== 'undefined') {
                    Notification.success('تم حذف المورد بنجاح');
                }

            } catch (error) {
                console.error('Error during supplier deletion process:', error);
                if (typeof Notification !== 'undefined') {
                    Notification.error('حدث خطأ أثناء حذف المورد');
                }
            }
        }
        
        // Call Supplier
        function callSupplier(phone) {
            window.location.href = `tel:${phone}`;
        }

        function whatsappSupplier(phone) {
            // تنظيف الرقم: شيل المسافات والشرطات وتأكد إنه يبدأ بـ 20 لو مصري
            let cleaned = phone.replace(/[\s\-\(\)]/g, '');
            if (cleaned.startsWith('0')) cleaned = '2' + cleaned; // 01x → 201x
            if (!cleaned.startsWith('+')) cleaned = '+' + cleaned;
            const url = `https://wa.me/${cleaned.replace('+', '')}`;
            // في Electron نفتح في المتصفح الخارجي
            if (window.require) {
                window.require('electron').shell.openExternal(url);
            } else {
                window.open(url, '_blank');
            }
        }

        // Handle Supplier Form Submit
        async function handleSupplierSubmit(event) {
            event.preventDefault();
            
            const supplier = {
                id: editingSupplierId,
                name: document.getElementById('supplierName').value.trim(),
                phone: document.getElementById('supplierPhone').value.trim(),
                products: document.getElementById('supplierProducts').value.trim(),
                createdAt: editingSupplierId ? suppliers.find(s => s.id === editingSupplierId)?.createdAt : new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            try {
                await DataManager.saveSupplier(supplier);
                await loadSuppliers();
                closeSupplierModal();
                
                if (typeof Notification !== 'undefined') {
                    Notification.success(editingSupplierId ? 'تم تحديث المورد بنجاح' : 'تم إضافة المورد بنجاح');
                }
            } catch (error) {
                console.error('Error saving supplier:', error);
                if (typeof Notification !== 'undefined') {
                    Notification.error('حدث خطأ أثناء حفظ المورد');
                }
            }
        }
        
        // Search Suppliers
        function initSearch() {
            const searchInput = document.getElementById('supplierSearch');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const searchTerm = e.target.value.toLowerCase();
                    const cards = document.querySelectorAll('.supplier-card');
                    
                    cards.forEach(card => {
                        const name = card.querySelector('.supplier-name').textContent.toLowerCase();
                        const phone = card.querySelectorAll('.supplier-detail-item span')[0]?.textContent.toLowerCase() || '';
                        const products = card.querySelectorAll('.supplier-detail-item span')[1]?.textContent.toLowerCase() || '';
                        
                        if (name.includes(searchTerm) || phone.includes(searchTerm) || products.includes(searchTerm)) {
                            card.style.display = 'block';
                        } else {
                            card.style.display = 'none';
                        }
                    });
                });
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadSuppliers();
            initSearch();
        });
    </script>

    <script src="saas/sidebar.js"></script>
    <script src="saas/onboarding-ui.js"></script>
    <script src="saas/plans-ui.js"></script>
    <script src="saas/auth-ui.js"></script>
    <script src="saas/subscription-manager.js"></script>

</body>
</html>
