<head>
    <script>
        (function() {
            const isLoggedIn    = localStorage.getItem('isLoggedIn') === 'true';
            const pinVerified   = sessionStorage.getItem('isPinVerified') === 'true';
            const onboardingDone = localStorage.getItem('solo_onboarding_done') === 'true';

            // مستخدم جديد تماماً أو مسجّلش → روح index عشان subscription-manager يعرض شاشة التسجيل
            if (!isLoggedIn && !onboardingDone) {
                window.location.replace('index.html');
                return;
            }
            // مستخدم موجود وعمل PIN في الجلسة دي → مش محتاج PIN تاني
            if (isLoggedIn && pinVerified) {
                window.location.replace('index.html');
                return;
            }
            // مستخدم موجود ومش عمل PIN في الجلسة دي → اعرض شاشة PIN (الكود يكمل)
        })();
    </script>

<script>
    // 4. منطق لوحة الأرقام (الـ PIN Pad)
    let enteredPIN = '';
    const MAX_PIN_LENGTH = 4;

    function updatePINDisplay() {
        const dots = document.querySelectorAll('.pin-dot');
        dots.forEach((dot, i) => {
            dot.classList.toggle('filled', i < enteredPIN.length);
        });
        document.getElementById('enterBtn').classList.toggle('active', enteredPIN.length === MAX_PIN_LENGTH);
    }

    function enterPIN(num) {
        if (enteredPIN.length < MAX_PIN_LENGTH) {
            enteredPIN += num;
            updatePINDisplay();
            if (enteredPIN.length === MAX_PIN_LENGTH) verifyPIN();
        }
    }

    function deleteLast() {
        enteredPIN = enteredPIN.slice(0, -1);
        updatePINDisplay();
    }

    function clearPIN() {
        enteredPIN = '';
        updatePINDisplay();
    }

    // ربط الزراير بالوظائف (عشان الزراير تنطق)
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.pin-key[data-number]').forEach(btn => {
            btn.onclick = () => enterPIN(btn.dataset.number);
        });
        document.getElementById('deleteBtn').onclick = deleteLast;
        document.getElementById('clearBtn').onclick = clearPIN;
        document.getElementById('enterBtn').onclick = verifyPIN;
    });

    async function verifyPIN() {
        if (enteredPIN.length !== 4) return;
        const btn = document.getElementById('enterBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        // ── 1a. فحص محلي للـ Owner (solo_user_pin) ────────────────────────
        const ownerPin = localStorage.getItem('solo_user_pin');
        if (ownerPin && String(enteredPIN) === String(ownerPin)) {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userRole', 'owner');
            localStorage.setItem('userPermissions', '[]'); // المالك مش محتاج perms
            sessionStorage.setItem('isPinVerified', 'true');
            window.location.href = 'index.html';
            return;
        }

        // ── 1b. فحص محلي للـ Cashiers من مصفوفة users (offline-safe) ────────
        try {
            const localUsers = JSON.parse(localStorage.getItem('users') || '[]');
            const matchedUser = localUsers.find(u =>
                u.active !== false &&
                u.deleted !== true &&
                String(u.pin) === String(enteredPIN)
            );
            if (matchedUser) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userRole', matchedUser.role || 'cashier');
                localStorage.setItem('username', matchedUser.name || matchedUser.displayName || '');
                localStorage.setItem('userId',   matchedUser.id  || '');
                localStorage.setItem('userPermissions', JSON.stringify(matchedUser.permissions || []));
                sessionStorage.setItem('isPinVerified', 'true');
                window.location.href = 'index.html';
                return;
            }
        } catch(e) { console.warn('Local users check failed:', e); }

        // ── 2. فحص Firestore للـ Cashiers (يحتاج اتصال + Firebase auth) ─────
        let user = null;
        try {
            // سجّل دخول anonymous عشان Firestore يقبل الـ query
            if (!firebase.auth().currentUser) {
                await firebase.auth().signInAnonymously();
            }
            user = await window.FirestoreService.verifyPin(enteredPIN);
        } catch(e) {
            console.warn('Firestore PIN check failed:', e.message);
        }

        if (user) {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userRole', user.role);
            localStorage.setItem('username', user.name || user.displayName || '');
            localStorage.setItem('userId',   user.id  || '');
            localStorage.setItem('userPermissions', JSON.stringify(user.permissions || []));
            sessionStorage.setItem('isPinVerified', 'true');
            window.location.href = 'index.html';
        } else {
            alert('❌ رقم PIN غير صحيح');
            clearPIN();
            btn.disabled = false;
            btn.innerHTML = '<span>دخول</span> <i class="fas fa-arrow-left"></i>';
        }
    }
</script>

    <script src="saas/plans-ui.js"></script>

    <script>
    // ═══════════════════════════════════════════════════════
    // SaaS Feature Gates — إخفاء الصفحات حسب الباقة
    // ═══════════════════════════════════════════════════════
    window.addEventListener('saas-ready', function () {

        // ── الصفحات المقفولة على Basic فأكثر ──────────────
        if (!window.SaaS.canUse('reports')) {
            document.querySelector('a[href="reports.html"]')
                ?.style.setProperty('display', 'none', 'important');
        }
        if (!window.SaaS.canUse('customers')) {
            document.querySelector('a[href="customers.html"]')
                ?.style.setProperty('display', 'none', 'important');
        }

        // ── الصفحات المقفولة على Pro فقط ───────────────────
        if (!window.SaaS.canUse('whatsapp')) { // 'whatsapp' is a Pro feature
            document.querySelector('a[href="marketing.html"]')
                ?.style.setProperty('display', 'none', 'important');
        }
        
        // ── Badge ──────────────────────────────────────────
        const plan = window.SaaS.getPlan();
        const planLabel = window.SaaS.getPlanLabel();
        const endDate = window.SaaS.getEndDate();

        const sidebar = document.querySelector('.sidebar');
        if (sidebar && !document.getElementById('saas-plan-badge')) {
            const badge = document.createElement('div');
            badge.id = 'saas-plan-badge';

            const colors = { trial: '#4a9eff', basic: '#d4af37', pro: '#9b59b6', mega: '#e74c3c' };
            const color  = colors[plan] || '#d4af37';

            const daysLeft = endDate
                ? Math.max(0, Math.ceil((new Date(endDate) - new Date()) / 86400000))
                : null;

            badge.style.cssText = 'margin: 12px; padding: 12px 14px; background: ' + color + '15; border: 1px solid ' + color + '44; border-radius: 10px; font-size: 12px; text-align: center;';
            
            let badgeHTML = '<div style="color:' + color + '; font-weight:700; margin-bottom:4px;">' + (plan === 'mega' ? '🚀' : plan === 'pro' ? '👑' : plan === 'basic' ? '⭐' : '🕐') + ' ' + planLabel + '</div>';

            if (daysLeft !== null) {
                badgeHTML += '<div style="color:#888; font-size:11px;">' + daysLeft + ' يوم متبقي</div>';
            }

            if (plan !== 'mega') {
                badgeHTML += '<button onclick="window.SaaS.requireFeature(&quot;dashboard&quot;)" style="margin-top:8px;width:100%;padding:6px;background:' + color + ';border:none;border-radius:6px;color:#000;font-size:11px;font-weight:700;cursor:pointer;">ترقية الباقة ↑</button>';
            }

            badge.innerHTML = badgeHTML;
            sidebar.appendChild(badge);
        }

    });
    </script>
